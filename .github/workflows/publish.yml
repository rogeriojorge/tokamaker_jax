name: Publish

on:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

concurrency:
  group: publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  release-test:
    name: Release tests and docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev,docs]"
      - name: Ruff
        run: |
          ruff format --check .
          ruff check .
      - name: Test
        run: pytest --cov=tokamaker_jax --cov-fail-under=95
      - name: Build docs
        run: sphinx-build -W -b html docs docs/_build/html

  release-build:
    name: Build and check distributions
    runs-on: ubuntu-latest
    needs: release-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install release tooling
        run: python -m pip install build twine
      - name: Build distributions
        run: python -m build --sdist --wheel
      - name: Check distribution metadata
        run: python -m twine check --strict dist/*
      - name: Install built wheel
        run: |
          python -m pip install --force-reinstall dist/*.whl
          cd /tmp
          python - <<'PY'
          from importlib.metadata import version

          import tokamaker_jax

          print(f"tokamaker-jax {version('tokamaker-jax')} import OK")
          print(tokamaker_jax.RectangularGrid(1.0, 2.0, -0.5, 0.5, 9, 9))
          PY
      - name: Upload release distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/*

  pypi:
    name: Publish distributions to PyPI
    runs-on: ubuntu-latest
    needs: release-build
    if: github.event_name == 'release'
    environment:
      name: pypi
      url: https://pypi.org/p/tokamaker-jax
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download release distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
