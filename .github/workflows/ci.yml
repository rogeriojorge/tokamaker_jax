name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Ruff
        run: |
          ruff format --check .
          ruff check .
      - name: Test
        run: pytest --cov=tokamaker_jax --cov-report=xml --cov-fail-under=95
      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false

  benchmarks:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Generate benchmark artifact
        run: |
          python examples/benchmark_report.py \
            --repeats 1 \
            --warmups 0 \
            --output outputs/benchmark_report.json \
            --thresholds docs/validation/benchmark_thresholds.json \
            --comparison-output outputs/benchmark_threshold_report.json \
            --fail-on-threshold
      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tokamaker-jax-benchmarks
          path: |
            outputs/benchmark_report.json
            outputs/benchmark_threshold_report.json
